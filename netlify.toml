[build]
  publish = "."
  command = "node scripts/inject-ga.js" # Injects GA tag securely during build
  [build.environment]
    SECRETS_SCAN_OMIT_KEYS = "GA_MEASUREMENT_ID"

[[redirects]]
  from = "/privacy"
  to = "/privacy/index.html"
  status = 200

[[redirects]]
  from = "/privacy/"
  to = "/privacy/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
