[build]
  publish = "."
  command = "node scripts/inject-ga.js && node scripts/inject-indexnow.js" # Injects tags securely during build
  [build.environment]
    SECRETS_SCAN_OMIT_KEYS = "GA_MEASUREMENT_ID"

[[redirects]]
  from = "/privacy"
  to = "/privacy/index.html"
  status = 200

[[redirects]]
  from = "/privacy/"
  to = "/privacy/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    X-Frame-Options             = "SAMEORIGIN"
    X-Content-Type-Options      = "nosniff"
    Referrer-Policy             = "strict-origin-when-cross-origin"
    Permissions-Policy          = "camera=(), microphone=(), geolocation=()"

# ── Serve robots.txt with correct content type ───────────────
[[headers]]
  for = "/robots.txt"
  [headers.values]
    Content-Type  = "text/plain; charset=utf-8"
    Cache-Control = "public, max-age=86400"

# ── Serve sitemap.xml with correct content type ──────────────
[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type  = "application/xml; charset=utf-8"
    Cache-Control = "public, max-age=86400"

# ── Serve llms.txt with correct content type ─────────────────
[[headers]]
  for = "/llms.txt"
  [headers.values]
    Content-Type  = "text/plain; charset=utf-8"
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
