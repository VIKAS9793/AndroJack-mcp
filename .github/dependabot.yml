version: 2

updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
      day: "monday"
      time: "06:00"
      timezone: "UTC"

    open-pull-requests-limit: 5

    versioning-strategy: increase

    commit-message:
      prefix: "chore(deps)"
      include: "scope"

    labels:
      - "dependencies"
      - "security"

    groups:
      patch-updates:
        update-types:
          - "patch"

      minor-updates:
        update-types:
          - "minor"

      dev-dependencies:
        dependency-type: "development"

    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"

    allow:
      - dependency-type: "all"
