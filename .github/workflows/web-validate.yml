name: Web Validate

on:
  pull_request:
    branches:
      - androjack-web-page
  push:
    branches:
      - androjack-web-page

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify release consistency
        shell: bash
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          LOCK_VERSION="$(node -p "require('./package-lock.json').version")"
          ROOT_LOCK_VERSION="$(node -p "require('./package-lock.json').packages[''].version")"

          test "$LOCK_VERSION" = "$VERSION"
          test "$ROOT_LOCK_VERSION" = "$VERSION"

          grep -F "\"softwareVersion\": \"$VERSION\"" index.html
          grep -F "npx androjack-mcp@$VERSION install" index.html
          grep -F "VIKAS9793.androjack-vscode@$VERSION" index.html
          grep -F "const displayVersion = (version && version >= '$VERSION') ? version : '$VERSION';" index.html
          grep -F "npm install -g androjack-mcp@$VERSION" llms.txt
          grep -F "vikas9793.androjack-vscode@$VERSION" llms.txt

      - name: Reject stale public version references
        shell: bash
        run: |
          if grep -R -n -E '1\.6\.(1|2)' index.html llms.txt package.json package-lock.json; then
            echo "Found stale 1.6.1/1.6.2 references in release surfaces"
            exit 1
          fi
