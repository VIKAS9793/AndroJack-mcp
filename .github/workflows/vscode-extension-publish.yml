name: VS Code Extension Publish

on:
  push:
    tags:
      - "vscode-v*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/vscode-v')
        shell: bash
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          TAG_VERSION="${GITHUB_REF#refs/tags/vscode-v}"
          if [ "$VERSION" != "$TAG_VERSION" ]; then
            echo "Tag version vscode-v$TAG_VERSION does not match package.json version $VERSION"
            exit 1
          fi

      - name: Reject merge conflict markers
        shell: bash
        run: |
          if git grep -nE '^(<<<<<<<|=======|>>>>>>>)' -- .; then
            echo "Merge conflict markers found"
            exit 1
          fi

      - name: Verify release consistency
        shell: bash
        run: |
          VERSION="$(node -p "require('./package.json').version")"

          grep -F "[![Version ${VERSION}]" README.md
          grep -F "androjack-mcp@${VERSION}" README.md
          grep -F "## ${VERSION}" CHANGELOG.md
          grep -F "androjack-mcp@${VERSION}" src/extension.ts

      - name: Build extension and test output
        run: npm run build:test

      - name: Run extension tests
        run: xvfb-run -a npm test

      - name: Package VSIX
        run: npm run package:vsix

      - name: Validate packaged README asset
        run: npm run verify:vsix

      - name: Resolve package path
        shell: bash
        run: |
          NAME="$(node -p "require('./package.json').name")"
          VERSION="$(node -p "require('./package.json').version")"
          echo "PACKAGE_PATH=./${NAME}-${VERSION}.vsix" >> "$GITHUB_ENV"

      - name: Publish to Visual Studio Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: npx @vscode/vsce publish --packagePath "$PACKAGE_PATH"
