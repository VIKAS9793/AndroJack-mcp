name: Update Traffic Stats

on:
  schedule:
    - cron: '0 0 * * *' # Every night at midnight
  workflow_dispatch: # Allow manual trigger

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Fetch Clone Count
        id: fetch-clones
        run: |
          # Use Bearer for Fine-grained PATs
          # Fetch Clones from GitHub Traffic API
          RESPONSE=$(curl -s -w "\n%{http_code}" -H "Authorization: Bearer ${{ secrets.GH_PAT }}" \
            "https://api.github.com/repos/VIKAS9793/AndroJack-mcp/traffic/clones")
          
          # Split response and status code
          HTTP_CODE=$(echo "$RESPONSE" | tail -n 1)
          CLONES_JSON=$(echo "$RESPONSE" | head -n -1)
          
          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "Error fetching clones (HTTP $HTTP_CODE): $CLONES_JSON"
            echo "TIP: For Fine-grained tokens, you may need 'Administration' (Read-only) permissions."
            exit 1
          fi
          
          # Extract total clones using jq
          TOTAL_CLONES=$(echo $CLONES_JSON | jq '.count')
          
          if [ "$TOTAL_CLONES" == "null" ] || [ -z "$TOTAL_CLONES" ]; then
            echo "Error fetching clones: $CLONES_JSON"
            exit 1
          fi
          
          echo "Total Clones: $TOTAL_CLONES"
          echo "clones=$TOTAL_CLONES" >> $GITHUB_OUTPUT

      - name: Update assets/clones.json
        run: |
          echo "{\"clones\": ${{ steps.fetch-clones.outputs.clones }}}" > assets/clones.json
          
      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/clones.json
          git commit -m "docs: update clones metric [skip ci]" || echo "No changes to commit"
          git push
